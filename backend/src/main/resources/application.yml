spring:
  application:
    name: globalfin-backend
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database: h2
  datasource:
    url: jdbc:h2:mem:globalfin-db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  security:
    user:
      name: admin
      password: admin123

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.globalfin: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
