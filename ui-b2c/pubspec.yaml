name: globalfin_b2c
description: "GlobalFin - Aplicación móvil B2C para clientes"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  http: ^1.1.0
  provider: ^6.0.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Fuentes (a definir en diseño high-fi)
  fonts:
    - family: GlobalFinRegular
      fonts:
        - asset: assets/fonts/roboto/Roboto-Regular.ttf

assets:
  - assets/images/
  - assets/icons/
