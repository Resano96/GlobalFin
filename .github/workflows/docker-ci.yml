name: GlobalFin Docker CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-images:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Backend Image
      run: docker build -f Dockerfile.backend -t globalfin/backend:${{ github.sha }} .
    
    - name: Build Flutter Image
      run: docker build -f Dockerfile.flutter -t globalfin/flutter:${{ github.sha }} .

  test-backend:
    runs-on: ubuntu-latest
    needs: build-images
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Backend Image
      run: docker build -f Dockerfile.backend -t globalfin/backend:${{ github.sha }} .
    
    - name: Run Backend Tests
      run: |
        docker run --rm -v ${{ github.workspace }}/backend:/workspace/backend \
          -w /workspace/backend \
          globalfin/backend:${{ github.sha }} \
          clean test -DskipSpotbugs

  test-ui-b2b:
    runs-on: ubuntu-latest
    needs: build-images
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Backend Image
      run: docker build -f Dockerfile.backend -t globalfin/backend:${{ github.sha }} .
    
    - name: Run UI B2B Tests
      run: |
        docker run --rm -v ${{ github.workspace }}/ui-b2b:/workspace/ui-b2b \
          -w /workspace/ui-b2b \
          globalfin/backend:${{ github.sha }} \
          clean test -DskipSpotbugs

  test-ui-b2c:
    runs-on: ubuntu-latest
    needs: build-images
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Flutter Image
      run: docker build -f Dockerfile.flutter -t globalfin/flutter:${{ github.sha }} .
    
    - name: Run UI B2C Tests
      run: |
        docker run --rm -v ${{ github.workspace }}/ui-b2c:/workspace/ui-b2c \
          -w /workspace/ui-b2c \
          globalfin/flutter:${{ github.sha }} test

  codecov:
    runs-on: ubuntu-latest
    needs: test-backend
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Backend for Coverage
      run: docker build -f Dockerfile.backend -t globalfin/backend:latest .
    
    - name: Extract Coverage Reports
      run: |
        docker run --rm -v ${{ github.workspace }}/backend:/workspace/backend \
          -w /workspace/backend \
          globalfin/backend:latest \
          clean test -DskipSpotbugs
    
    - name: Upload to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/target/site/jacoco/index.html
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
